<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Release Delivery Portal</title>

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial, sans-serif;
  margin:0;
  padding:30px 15px;
}

.container {
  max-width:650px;
  margin:auto;
  background:#151515;
  padding:35px 25px;
  border-radius:16px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h1 {
  text-align:center;
  margin-bottom:25px;
  font-size:24px;
  font-weight:600;
}

label {
  display:block;
  margin-top:18px;
  margin-bottom:6px;
  font-size:14px;
  color:#ccc;
}

input, select {
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#222;
  color:white;
  font-size:14px;
}

.track {
  background:#1c1c1c;
  padding:18px;
  border-radius:12px;
  margin-top:20px;
}

button {
  width:100%;
  padding:16px;
  margin-top:25px;
  border-radius:12px;
  border:none;
  background:#00ff99;
  color:black;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
}

button:hover {
  background:#00cc77;
}

img.preview {
  width:100%;
  margin-top:15px;
  border-radius:12px;
}

.logo {
  width:120px;
  display:block;
  margin:0 auto 20px auto;
}

.dropzone {
  border:2px dashed #444;
  padding:20px;
  text-align:center;
  border-radius:12px;
  margin-top:10px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">
<h1>Release Upload</h1>

<form id="releaseForm">

<label>Artist Name</label>
<input type="text" id="artistName" required>

<label>Release Type</label>
<select id="releaseType" required>
<option value="">Select</option>
<option value="Single">Single</option>
<option value="EP">EP</option>
<option value="Album">Album</option>
</select>

<div id="tracksContainer"></div>

<label>Cover Artwork (3000x3000)</label>
<div class="dropzone" id="coverDrop">
Drop artwork here or click
<input type="file" id="coverArt" style="display:none" required>
</div>

<button type="button" id="addTrackBtn">+ Add Another Track</button>
<button type="submit" id="submitBtn">Send Release 🚀</button>

</form>

<div id="successScreen" style="display:none;text-align:center;padding:40px 20px;">
<h2 style="color:#00ff99;">✅ Release Submitted</h2>
<p style="color:#ccc;margin-top:10px;">Your files were delivered to Funk UNIVERSE</p>
<button onclick="location.reload()" style="margin-top:20px;padding:12px 25px;border:none;border-radius:10px;background:#00ff99;font-weight:bold;">
Submit Another Release
</button>
</div>

</div>

<script>

const CLOUD_NAME="djpeitfan";
const UPLOAD_PRESET="label_upload";

const tracksContainer=document.getElementById("tracksContainer");
const addTrackBtn=document.getElementById("addTrackBtn");
const releaseType=document.getElementById("releaseType");
const form=document.getElementById("releaseForm");
const submitBtn=document.getElementById("submitBtn");

const coverDrop=document.getElementById("coverDrop");
const coverInput=document.getElementById("coverArt");

coverDrop.onclick=()=>coverInput.click();

coverDrop.addEventListener("drop",e=>{
e.preventDefault();
coverInput.files=e.dataTransfer.files;
coverDrop.innerText=e.dataTransfer.files[0].name;
});

coverDrop.addEventListener("dragover",e=>e.preventDefault());

coverInput.addEventListener("change",()=>{
coverDrop.innerText=coverInput.files[0].name;
});

function addTrack(){

const div=document.createElement("div");
div.className="track";

div.innerHTML=`
<label>Track Title</label>
<input type="text" required>

<label>Version Name (optional)</label>
<input type="text">

<label>Audio File</label>

<div class="dropzone">
Drop audio here or click
<input type="file" class="audioFile" style="display:none" required>
</div>
`;

tracksContainer.appendChild(div);

const drop=div.querySelector(".dropzone");
const input=div.querySelector(".audioFile");

drop.onclick=()=>input.click();

drop.addEventListener("dragover",e=>e.preventDefault());

drop.addEventListener("drop",e=>{
e.preventDefault();
input.files=e.dataTransfer.files;
drop.innerText=e.dataTransfer.files[0].name;
});

input.addEventListener("change",()=>{
drop.innerText=input.files[0].name;
});

}

releaseType.addEventListener("change",()=>{
tracksContainer.innerHTML="";
addTrack();
});

addTrackBtn.addEventListener("click",addTrack);

function uploadFile(file,type,progressCallback){

return new Promise(resolve=>{

const resourceType=type==="image"?"image":"video";

const xhr=new XMLHttpRequest();

const url=`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resourceType}/upload`;

const formData=new FormData();
formData.append("file",file);
formData.append("upload_preset",UPLOAD_PRESET);

xhr.upload.onprogress=e=>{
if(e.lengthComputable){
const percent=Math.round((e.loaded/e.total)*100);
progressCallback(percent);
}
};

xhr.onload=()=>{
try{
const res=JSON.parse(xhr.responseText);
resolve(res.secure_url);
}catch{
resolve(null);
}
};

xhr.onerror=()=>resolve(null);

xhr.open("POST",url);
xhr.send(formData);

});

}

form.addEventListener("submit",async(e)=>{

e.preventDefault();

submitBtn.disabled=true;
submitBtn.innerText="Starting Upload...";

let trackInfo="";
const tracks=document.querySelectorAll(".track");

for(let i=0;i<tracks.length;i++){

const inputs=tracks[i].querySelectorAll("input");

const title=inputs[0].value;
const version=inputs[1].value;
const audioInput=tracks[i].querySelector(".audioFile");

const file=audioInput.files[0];

if(!file){
alert("Audio missing");
return;
}

const audioUrl=await uploadFile(file,"audio",percent=>{
submitBtn.innerText=`Uploading Audio ${percent}%`;
});

if(!audioUrl){
alert("Audio upload failed");
return;
}

trackInfo+=`Track ${i+1}\nTitle:${title}\nVersion:${version}\nAudio:${audioUrl}\n\n`;

}

const coverFile=coverInput.files[0];

const coverUrl=await uploadFile(coverFile,"image",percent=>{
submitBtn.innerText=`Uploading Cover ${percent}%`;
});

const data=new FormData();

data.append("artist",document.getElementById("artistName").value);
data.append("release_type",releaseType.value);
data.append("tracks",trackInfo);
data.append("cover_art",coverUrl);

fetch("https://formspree.io/f/mzzrkpqj",{
method:"POST",
body:data,
headers:{Accept:"application/json"}
}).catch(()=>{});

form.style.display="none";
document.getElementById("successScreen").style.display="block";

});

</script>

</body>
</html>
